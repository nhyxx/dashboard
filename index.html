<html lang="ko">
<head>
  <meta charset="UTF-8">

  <link

  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    #map {
      width: 100%;
      height: 100vh;
    }

    .control-panel {
      position: absolute;
      top: 14px;
      left: 14px;
      z-index: 1000;
      width: 320px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.25);
      padding: 16px;
    }

    .detail-panel {
      position: absolute;
      top: 14px;
      left: 360px;
      right: 14px;
      z-index: 1000;
      background: rgba(255,255,255,0.97);
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.25);
      padding: 16px;
      min-height: 92px;
    }

    .title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    select {
      width: 100%;
      padding: 8px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
      background: white;
    }

    .info-box {
      font-size: 12px;
      line-height: 1.6;
      color: #333;
      margin-top: 8px;
    }

    .legend {
      margin-top: 12px;
      font-size: 12px;
      line-height: 1.6;
    }

    .legend-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .legend-color {
      width: 18px;
      height: 10px;
      display: inline-block;
    }

    .detail-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 10px;
      color: #222;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(120px, 1fr));
      gap: 10px;
    }

    .detail-card {
      background: #f8f9fb;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 10px 12px;
    }

    .detail-label {
      font-size: 12px;
      color: #666;
      margin-bottom: 4px;
    }

    .detail-value {
      font-size: 16px;
      font-weight: 700;
      color: #111;
    }

    @media (max-width: 1200px) {
      .detail-grid {
        grid-template-columns: repeat(3, minmax(120px, 1fr));
      }
    }

    @media (max-width: 900px) {
      .detail-panel {
        left: 14px;
        top: 360px;
      }
      .detail-grid {
        grid-template-columns: repeat(2, minmax(120px, 1fr));
      }
    }
  </style>
</head>

const map = L.map('map').setView([36.558756143659124, 129.83445736233824], 8);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
}).addTo(map);

const diseaseSelect = document.getElementById("diseaseSelect");
const monthSelect = document.getElementById("monthSelect");
const infoBox = document.getElementById("infoBox");
const detailContent = document.getElementById("detailContent");

let currentLayer = null;
let selectedLayer = null;

function fmt(v, digit=2) {
  if (v === null || v === undefined || isNaN(v)) return "데이터 없음";
  return Number(v).toFixed(digit);
}

function getColor(v) {
  if (v === null || v === undefined || isNaN(v)) return "#d9d9d9";
  if (v >= 80) return "#cc4c02";
  if (v >= 60) return "#ec7014";
  if (v >= 40) return "#fe9929";
  if (v >= 20) return "#fec44f";
  if (v >= 10) return "#fee391";
  return "#fff7bc";
}

function updateDetailPanel(name, disease, month, stat) {
  if (!stat) {
    detailContent.innerHTML = `
      <div><b>${name}</b></div>
      <div style="margin-top:8px;">해당 지역의 상세 통계가 없습니다.</div>
    `;
    return;
  }

  detailContent.innerHTML = `
    <div class="detail-title">${name} | ${disease} | ${month}월</div>
    <div class="detail-grid">
      <div class="detail-card">
        <div class="detail-label">위험지수</div>
        <div class="detail-value">${fmt(stat["위험지수"], 2)}</div>
      </div>
      <div class="detail-card">
        <div class="detail-label">고령인구비율</div>
        <div class="detail-value">${fmt(stat["고령인구비율"], 2)}%</div>
      </div>
      <div class="detail-card">
        <div class="detail-label">농가인구</div>
        <div class="detail-value">${stat["농가인구"] == null || isNaN(stat["농가인구"]) ? "데이터 없음" : Number(stat["농가인구"]).toLocaleString()}</div>
      </div>
      <div class="detail-card">
        <div class="detail-label">평균기온</div>
        <div class="detail-value">${fmt(stat["평균기온"], 2)}℃</div>
      </div>
      <div class="detail-card">
        <div class="detail-label">강수량</div>
        <div class="detail-value">${fmt(stat["강수량"], 2)} mm</div>
      </div>
    </div>
  `;
}

function drawMap() {
  const disease = diseaseSelect.value;
  const month = String(monthSelect.value);

  const lookup = (riskLookup[disease] && riskLookup[disease][month]) ? riskLookup[disease][month] : {};
  const statLookup = (statsLookup[disease] && statsLookup[disease][month]) ? statsLookup[disease][month] : {};

  if (currentLayer) {
    map.removeLayer(currentLayer);
  }

  selectedLayer = null;
  detailContent.innerHTML = "지도의 시군구를 클릭하면 상세 통계가 표시됩니다.";

  const vals = [];

  currentLayer = L.geoJSON(geoData, {
    style: function(feature) {
      const code = String(feature.properties["시군구코드"]);
      const v = lookup[code];

      if (v !== null && v !== undefined && !isNaN(v)) {
        vals.push(Number(v));
      }

      return {
        color: "#666",
        weight: 0.8,
        fillColor: getColor(v),
        fillOpacity: 0.72
      };
    },
    onEachFeature: function(feature, layer) {
      const code = String(feature.properties["시군구코드"]);
      const name = feature.properties["시군구명_shp"];
      const v = lookup[code];
      const stat = statLookup[code];

      let txt = "<b>" + name + "</b><br>";
      txt += "질병: " + disease + "<br>";
      txt += "월: " + month + "월<br>";
      txt += "위험지수: " + ((v !== null && v !== undefined && !isNaN(v)) ? Number(v).toFixed(2) : "데이터 없음");

      layer.bindTooltip(txt);

      layer.on("click", function() {
        if (selectedLayer) {
          currentLayer.resetStyle(selectedLayer);
        }

        selectedLayer = layer;
        layer.setStyle({
          color: "#111",
          weight: 2.2,
          fillOpacity: 0.9
        });

        updateDetailPanel(name, disease, month, stat);
      });
    }
  }).addTo(map);

  if (vals.length > 0) {
    const avg = vals.reduce((a, b) => a + b, 0) / vals.length;
    const maxv = Math.max(...vals);
    const minv = Math.min(...vals);

    infoBox.innerHTML =
      "평균 위험지수: " + avg.toFixed(2) + "<br>" +
      "최대 위험지수: " + maxv.toFixed(2) + "<br>" +
      "최소 위험지수: " + minv.toFixed(2) + "<br>" +
      "색칠된 시군구 수: " + vals.length;
  } else {
    infoBox.innerHTML = "해당 조건의 데이터 없음";
  }
}

diseaseSelect.addEventListener("change", drawMap);
monthSelect.addEventListener("change", drawMap);

drawMap();
</script>
